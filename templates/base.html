<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}QR.track{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #080b12;
      --surface: #0f1520;
      --surface-2: #161d2e;
      --border: rgba(99,130,255,0.12);
      --border-bright: rgba(99,130,255,0.3);
      --accent: #6382ff;
      --accent-2: #a78bfa;
      --accent-glow: rgba(99,130,255,0.25);
      --text: #e8ecf4;
      --text-muted: #6b7a99;
      --text-dim: #3d4a66;
      --success: #34d399;
      --danger: #f87171;
      --warning: #fbbf24;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,130,255,0.08) 0%, transparent 60%);
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      background: rgba(8,11,18,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; align-items: center; gap: 0.5rem; }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--text); background: var(--surface-2); }
    .nav-links a.btn-nav {
      background: var(--accent);
      color: white;
      font-weight: 500;
    }
    .nav-links a.btn-nav:hover { background: #7b96ff; }

    /* LAYOUT */
    .page { max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
    }
    .card-header {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 1.25rem;
      letter-spacing: -0.01em;
    }

    /* STAT CARDS */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      opacity: 0.6;
    }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--text); letter-spacing: -0.03em; }

    /* FORMS */
    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; }
    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .form-input::placeholder { color: var(--text-dim); }
    .form-errors { color: var(--danger); font-size: 0.8rem; margin-top: 0.3rem; }

    /* BUTTONS */
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #7b96ff; transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }
    .btn-ghost { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--border-bright); }
    .btn-danger { background: rgba(248,113,113,0.12); color: var(--danger); border: 1px solid rgba(248,113,113,0.2); }
    .btn-danger:hover { background: rgba(248,113,113,0.2); }
    .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.8rem; }

    /* BADGES */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
      font-family: 'DM Mono', monospace;
    }
    .badge-blue { background: rgba(99,130,255,0.12); color: var(--accent); }
    .badge-green { background: rgba(52,211,153,0.12); color: var(--success); }

    /* MESSAGES */
    .messages { padding: 0 1.5rem; margin-top: 1rem; }
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
      border: 1px solid;
    }
    .alert-success { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.2); color: var(--success); }
    .alert-error { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.2); color: var(--danger); }

    /* TABLES */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.6rem 1rem; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 500; }
    td { padding: 0.75rem 1rem; font-size: 0.85rem; border-bottom: 1px solid var(--border); color: var(--text-muted); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* CODE */
    .code-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent-2);
      word-break: break-all;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .code-block:hover { border-color: var(--accent); }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 4rem 2rem; }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
    .empty-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
    .empty-text { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem; }

    /* PAGE HEADER */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .page-title { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; letter-spacing: -0.03em; }
    .page-subtitle { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.25rem; }

    /* GRID */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    @media (max-width: 768px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .page { padding: 1.5rem 1rem; }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <nav>
    <a href="{% url 'home' %}" class="nav-logo">QR<span>.</span>track</a>
    <div class="nav-links">
      {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'create_qr' %}" class="btn-nav">+ New QR</a>
        <a href="{% url 'logout' %}">Logout</a>
      {% else %}
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'signup' %}" class="btn-nav">Get Started</a>
      {% endif %}
    </div>
  </nav>

  {% if messages %}
  <div class="messages">
    {% for msg in messages %}
    <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
    {% endfor %}
  </div>
  {% endif %}

  {% block content %}{% endblock %}
</body>
</html>
